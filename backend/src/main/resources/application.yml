spring:
  application:
    name: thebullpen
  profiles:
    default: api
  datasource:
    # M4 - SQLite per-connection PRAGMAs via the Xerial URL params (applied on every physical
    # connection the driver opens, which is the only reliable way to set per-connection pragmas):
    #   foreign_keys=true  - enforce the model_routing / experiment_results / retraining_queue ->
    #                        model_versions REFERENCES clauses (documentation-only until now, so an
    #                        orphaned routing/experiment row could be inserted against a missing id).
    #   busy_timeout=5000  - a concurrent worker write + admin promotion waits up to 5s for the write
    #                        lock instead of failing immediately with SQLITE_BUSY ("database is locked").
    # Inherited by Flyway too (spring.flyway.url below points back here). WAL is intentionally NOT set
    # here: it changes the on-disk journal format and adds -wal/-shm sidecars, so it is a deliberate,
    # separately-tracked box-side change rather than a quiet rider on this one.
    url: "jdbc:sqlite:${BULLPEN_REGISTRY_DB:./data/registry.sqlite}?foreign_keys=true&busy_timeout=5000"
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${spring.datasource.url}
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

server:
  port: ${BULLPEN_PORT:8080}
  shutdown: graceful
  # Honor X-Forwarded-* from the Cloudflare Tunnel (a trusted reverse proxy on the same box): gives
  # Spring the real client scheme/host so HSTS is emitted on the forwarded https request
  # (SecurityConfig) and redirects/links are correct. Harmless for the worker profile, which is not
  # internet-facing and receives no forwarded headers.
  forward-headers-strategy: framework

logging:
  level:
    root: INFO
    net.thebullpen: DEBUG

# A6 (ADR-0008) — error tracking via the Sentry SDK, reporting to a self-hosted
# GlitchTip (Sentry wire-compatible). Auto-disabled when the DSN is blank, which is
# the dev / CI / test default — so nothing phones home unless SENTRY_DSN is set in
# the prod systemd EnvironmentFile. send-default-pii stays false (no IPs / headers).
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:dev}
  release: ${SENTRY_RELEASE:}
  send-default-pii: false
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

bullpen:
  admin:
    # HTTP-Basic credentials for /v1/admin/** in the form "user:password".
    # Required in prod (sourced from secrets.env / systemd EnvironmentFile);
    # tests override via @DynamicPropertySource. Decision [29], leaf 3a.4.
    basicauth: ${THEBULLPEN_ADMIN_BASIC_AUTH:}
  metrics:
    # OPTIONAL metrics-only HTTP-Basic credential for the Prometheus scrape of
    # /actuator/prometheus, in the form "user:password". When set it gets the
    # METRICS role (scrape endpoint ONLY - never /actuator/env|heapdump|... or
    # /v1/admin), so a leaked scrape secret cannot reach the write/JVM surface.
    # When UNSET the scrape falls back to the ADMIN credential (current behavior),
    # so this is safe to ship before the box provisions the split secret.
    basicauth: ${THEBULLPEN_METRICS_BASIC_AUTH:}

  # ADR-0007: S3-compatible client. Prod = Cloudflare R2; offline dev = MinIO on
  # localhost:9000; tests = a Testcontainers MinIO with @DynamicPropertySource.
  # The endpoint URL is the only environment-specific knob.
  s3:
    endpoint-url: ${S3_ENDPOINT_URL:}
    region: ${S3_REGION:auto}
    access-key-id: ${S3_ACCESS_KEY_ID:}
    secret-access-key: ${S3_SECRET_ACCESS_KEY:}
    bucket: ${S3_BUCKET:bullpen-prod}

  # Snapshot storage layout (3a.5). Local base path is configurable so dev on
  # macOS doesn't try to write to /var/lib/thebullpen; prod sets this via the
  # systemd EnvironmentFile.
  snapshot:
    local-base-path: ${BULLPEN_MODELS_DIR:./data/models}
    keep-locally: 5
    archive-prefix: models-archive

  # Discord webhook for ops notices. Stubbed to log-only when the URL is blank
  # (3a.5 reconciliation job is the first caller; real client lands in 3c when
  # drift alerts need it). Source: DISCORD_WEBHOOK_URL.
  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL:}

  # A4 — per-IP token-bucket rate limiting on the unauthenticated, compute-bearing
  # endpoints (/v1/predict/**, /v1/players/search). In-memory (Caffeine), single-node;
  # Cloudflare sits in front for L3/L4. Disabled in the load + contract CI jobs (they
  # drive intentional high volume) and in unit tests (gradle test systemProperty).
  ratelimit:
    enabled: ${BULLPEN_RATELIMIT_ENABLED:true}
    predict-per-minute: ${BULLPEN_RATELIMIT_PREDICT:60}
    search-per-minute: ${BULLPEN_RATELIMIT_SEARCH:120}

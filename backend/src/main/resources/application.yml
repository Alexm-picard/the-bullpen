spring:
  application:
    name: thebullpen
  profiles:
    default: api
  datasource:
    url: jdbc:sqlite:${BULLPEN_REGISTRY_DB:./data/registry.sqlite}
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${spring.datasource.url}
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

server:
  port: ${BULLPEN_PORT:8080}
  shutdown: graceful

logging:
  level:
    root: INFO
    net.thebullpen: DEBUG

bullpen:
  admin:
    # HTTP-Basic credentials for /v1/admin/** in the form "user:password".
    # Required in prod (sourced from secrets.env / systemd EnvironmentFile);
    # tests override via @DynamicPropertySource. Decision [29], leaf 3a.4.
    basicauth: ${THEBULLPEN_ADMIN_BASIC_AUTH:}

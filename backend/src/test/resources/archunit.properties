# C1 architecture rules - FreezingArchRule store (the committed violation baseline).
# The path is relative to the Gradle working dir (backend/). allowStoreCreation stays FALSE so a
# missing store fails loud instead of silently re-baselining current violations.
#
# To RE-FREEZE deliberately (e.g. C2 draining the baseline, or adding a frozen rule): note that a
# `-Darchunit...` flag on the gradle command line does NOT reach the test JVM - edit THIS file
# instead. Either
#   (a) fresh baseline: delete src/test/resources/archunit-store/*, flip allowStoreCreation=true
#       below, run `./gradlew test --tests "*ArchitectureTest*"`, flip it back to false, and commit
#       the regenerated store; or
#   (b) incremental accept: temporarily add `freeze.refreeze=true` here, run the test, remove it.
# Adding a BRAND-NEW frozen rule needs neither: ArchUnit creates its store file and appends to
# stored.rules on a normal run (allowStoreCreation guards the DIRECTORY, not per-rule entries).
# Solved violations auto-drain on any normal run (allowStoreUpdate defaults true) - just commit the
# shrunken store.
freeze.store.default.path=src/test/resources/archunit-store
freeze.store.default.allowStoreCreation=false

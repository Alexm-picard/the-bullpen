# C1 architecture rules - FreezingArchRule store (the committed violation baseline).
# The path is relative to the Gradle working dir (backend/). allowStoreCreation stays FALSE so a
# missing store fails loud instead of silently re-baselining current violations; to (re)create the
# baseline deliberately, run once with
#   ./gradlew test --tests "*ArchitectureTest*" -Darchunit.freeze.store.default.allowStoreCreation=false
# and commit the resulting src/test/resources/archunit-store changes. C2 drains this store.
freeze.store.default.path=src/test/resources/archunit-store
freeze.store.default.allowStoreCreation=false

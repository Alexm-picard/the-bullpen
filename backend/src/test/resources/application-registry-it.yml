# Test profile placeholder for RegistrySchemaIT.
#
# The actual datasource URL is set per-test-class via @DynamicPropertySource
# in RegistrySchemaIT — using ${random.uuid} from YAML would re-resolve
# on every property lookup (Flyway and the datasource would point at
# different temp files). The dynamic-source path resolves the UUID once.

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  main:
    web-application-type: none

# Tests-only credential for /v1/admin/** HTTP-Basic (SecurityConfig).
# Prod sources this from THEBULLPEN_ADMIN_BASIC_AUTH; tests assert auth using
# these exact credentials so they're shared by RegistryAdminControllerIT.
bullpen:
  admin:
    basicauth: it-admin:it-password

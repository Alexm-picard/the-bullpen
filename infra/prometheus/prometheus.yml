global:
  scrape_interval: 15s
  evaluation_interval: 15s

# WS4: route firing alerts to Alertmanager (which fans out to the Discord webhook).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# WS4: alert rules live alongside this file under rules/ (mounted read-only).
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # M5: /actuator/prometheus is gated behind ADMIN HTTP Basic in the app's SecurityConfig (it leaks
  # queue depths, per-model prediction counts, JVM internals). The scrape authenticates with HTTP
  # Basic: `username` is the (non-secret) user-half of THEBULLPEN_ADMIN_BASIC_AUTH and MUST match it
  # (default "admin"); the password is the RAW password (NOT base64), read from a mounted, gitignored
  # secret file. Create infra/prometheus/secrets/metrics_pw from metrics_pw.example before bringing
  # the stack up (mounted read-only at /etc/prometheus/secrets, see docker-compose).
  # NOTE: HTTP Basic MUST use the `basic_auth:` block - Prometheus REJECTS `authorization: {type:
  # Basic}` ("use basic_auth instead"), which crash-looped the 2026-06-24 cutover. `promtool check
  # config` (infra.yml CI) now guards this syntax so it cannot recur.
  - job_name: "thebullpen-api"
    metrics_path: /actuator/prometheus
    basic_auth:
      username: admin
      password_file: /etc/prometheus/secrets/metrics_pw
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels: { profile: "api" }

  - job_name: "thebullpen-worker"
    metrics_path: /actuator/prometheus
    basic_auth:
      username: admin
      password_file: /etc/prometheus/secrets/metrics_pw
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels: { profile: "worker" }

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # WS4: host metrics (RAM/CPU/disk) + the snapshot-freshness textfile metric written by
  # clickhouse-snapshot.sh. The 12 GiB WSL2 cap is shared by everything, so host-RAM visibility
  # is the precondition for the MemAvailable alert.
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

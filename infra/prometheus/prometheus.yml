global:
  scrape_interval: 15s
  evaluation_interval: 15s

# WS4: route firing alerts to Alertmanager (which fans out to the Discord webhook).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# WS4: alert rules live alongside this file under rules/ (mounted read-only).
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "thebullpen-api"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels: { profile: "api" }

  - job_name: "thebullpen-worker"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels: { profile: "worker" }

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # WS4: host metrics (RAM/CPU/disk) + the snapshot-freshness textfile metric written by
  # clickhouse-snapshot.sh. The 12 GiB WSL2 cap is shared by everything, so host-RAM visibility
  # is the precondition for the MemAvailable alert.
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

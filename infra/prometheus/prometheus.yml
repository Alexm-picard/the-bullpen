global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "thebullpen-api"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels: { profile: "api" }

  - job_name: "thebullpen-worker"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels: { profile: "worker" }

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

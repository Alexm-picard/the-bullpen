# WS4 watchdogs. The minimum set that turns "the worker silently died and nobody noticed"
# (the 2026-06-04 blindspot) into a paged alert, plus host-RAM, JVM-heap, and snapshot-freshness.
# Validate on the box before trusting: `promtool check rules infra/prometheus/rules/bullpen-alerts.yml`.
groups:
  - name: bullpen
    rules:
      # The worker profile (drift jobs, retraining, live poller) is scraped at :8081. up==0 for 2m
      # means systemd could not keep it running - the exact gap that went unnoticed on 2026-06-04.
      - alert: WorkerDown
        expr: up{job="thebullpen-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Bullpen worker is down"
          description: "The worker (job=thebullpen-worker, :8081) has not been scrapeable for 2m. Drift jobs, retraining, and the live poller are not running. Check `systemctl status bullpen-worker` + `journalctl -u bullpen-worker`."

      # The api profile mirror of the same check (a down api = the public site is dark).
      - alert: ApiDown
        expr: up{job="thebullpen-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Bullpen API is down"
          description: "The api (job=thebullpen-api, :8080) has not been scrapeable for 2m. The public site is likely dark. Check `systemctl status bullpen-api`."

      # The 12 GiB WSL2 pool is shared by ClickHouse + both JVMs + Docker. < 800 MiB available is the
      # danger zone where the OOM killer starts reaping (ClickHouse and the worker are the usual victims).
      - alert: HostMemoryLow
        expr: node_memory_MemAvailable_bytes < 800 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host available memory below 800 MiB"
          description: "node_memory_MemAvailable_bytes={{ $value | humanize1024 }}B for 5m on the WSL2 host. The OOM killer is near; check the ClickHouse memory cap and the JVM heaps."

      # JVM heap saturation on either profile - a leak or an undersized -Xmx surfaces here before the
      # OutOfMemoryError that would crash the unit.
      - alert: JvmHeapHigh
        expr: |
          sum by (profile) (jvm_memory_used_bytes{area="heap"})
            / sum by (profile) (jvm_memory_max_bytes{area="heap"}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap above 90% ({{ $labels.profile }})"
          description: "The {{ $labels.profile }} profile heap has been > 90% of -Xmx for 5m. Investigate before the unit OOMs."

      # Snapshot freshness (internal half of the dead-man; the external half is the Healthchecks.io
      # ping in clickhouse-snapshot.sh, which survives a full host-down that this rule cannot).
      # The snapshot script writes bullpen_snapshot_last_success_timestamp_seconds to the node_exporter
      # textfile collector on success; > 26h stale means the daily 03:00 snapshot has missed a cycle.
      - alert: SnapshotStale
        expr: time() - bullpen_snapshot_last_success_timestamp_seconds > 26 * 3600
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "ClickHouse/registry snapshot is stale (> 26h)"
          description: "No successful snapshot in over 26h (last success {{ $value | humanizeDuration }} ago). The daily 03:00 timer has missed a cycle - backups are not current. Check `systemctl status bullpen-snapshot.timer` and the last clickhouse-snapshot.sh run."

      # --- M1 task 6 additions ------------------------------------------------

      # Disk: the WSL2 virtual disk filling is a slow-motion outage (ClickHouse parts, docker
      # logs, releases). Warn at <15%, page at <5%.
      - alert: DiskLow
        expr: |
          node_filesystem_avail_bytes{mountpoint="/"}
            / node_filesystem_size_bytes{mountpoint="/"} < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Root filesystem below 15% free"
          description: "Root fs is {{ $value | humanizePercentage }} free. Prune docker logs/images, old releases, and ClickHouse parts before DiskFull pages."

      - alert: DiskFull
        expr: |
          node_filesystem_avail_bytes{mountpoint="/"}
            / node_filesystem_size_bytes{mountpoint="/"} < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Root filesystem below 5% free"
          description: "Root fs is {{ $value | humanizePercentage }} free. ClickHouse inserts and journal writes are about to start failing."

      # ClickHouse's own liveness. The api deliberately stays UP when CH dies (Hikari
      # initializationFailTimeout(-1)), so ApiDown never covers this - only a scrape of
      # ClickHouse's native :9363 prometheus endpoint does.
      - alert: ClickHouseDown
        expr: up{job="clickhouse"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ClickHouse is down"
          description: "The clickhouse:9363 native prometheus endpoint has not been scrapeable for 2m. Predictions still serve (payload features) but prediction_log/drift/live ingest are all failing. Check `docker ps` + container logs."

      # The live poller stopped mid-window: a poll completed within the last 2h (so games WERE
      # being watched - the self-gate that stands in for an explicit active-games gauge) but none
      # in the last 5m. Quiet days never fire: the gauge goes stale past 2h and the gate closes.
      - alert: LivePollerStuck
        expr: |
          (time() - bullpen_ingest_last_poll_timestamp_seconds > 300)
            and (time() - bullpen_ingest_last_poll_timestamp_seconds < 7200)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Live poller has stopped mid-window"
          description: "Last successful game poll was {{ $value | humanizeDuration }} ago after recent activity - the poller is likely stuck while games are live. Check `journalctl -u bullpen-worker` and the MLB API."

      # The feed schema moved under the parser: sustained nonzero anomaly rate (unknown status /
      # missing gameDate / unknown pitch vocabulary). Rate only moves while games poll, so this is
      # inherently live-game-gated.
      - alert: ParserAnomalyRate
        expr: sum(rate(bullpen_ingest_parse_anomalies_total[15m])) > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "MLB feed parse anomalies are sustained"
          description: "Nonzero parse-anomaly rate for 30m ({{ $value }}/s). The GUMBO feed is handing back vocabulary/fields the parser degrades on - inspect the reason label breakdown before the drift dataset silently thins."

      # GPU thermals during the 2-6 AM retrains (M1 task 7's textfile collector). CPU temperature
      # is unreadable under WSL2; the box's shutdown risk IS the GPU under training load.
      - alert: GpuTempHigh
        expr: nvidia_gpu_temperature_celsius > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU above 80C"
          description: "GPU at {{ $value }}C for 5m. If a retrain is running, expect throttling; check case airflow."

      - alert: GpuTempCritical
        expr: nvidia_gpu_temperature_celsius > 90
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "GPU above 90C"
          description: "GPU at {{ $value }}C for 1m - shutdown territory. Kill the running retrain (`systemctl stop bullpen-retrain`) and investigate cooling before the box hard-stops."

name: thebullpen

# M1 task 8: bounded container logs everywhere (previously unbounded json-file - a chatty
# container could eat the WSL2 disk). Applied per-service below; takes effect at the next
# container recreate (the M2 window), not on merge.
x-logging: &bullpen-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: bullpen-clickhouse
    restart: unless-stopped
    logging: *bullpen-logging
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
      # M1 task 6: ClickHouse's native Prometheus endpoint (config.d/prometheus.xml mount below)
      # so ClickHouseDown can fire - the api survives a dead CH, so ApiDown never covers this.
      - "9363:9363"   # prometheus /metrics
    environment:
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      # Fail-closed: the container refuses to start without the rotated secret (no known default).
      # Value comes from the single BULLPEN_CLICKHOUSE_PASSWORD the app + scripts also read.
      CLICKHOUSE_PASSWORD: "${BULLPEN_CLICKHOUSE_PASSWORD:?set BULLPEN_CLICKHOUSE_PASSWORD to the rotated ClickHouse secret (no default)}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./clickhouse/config.d/prometheus.xml:/etc/clickhouse-server/config.d/prometheus.xml:ro
      # M2-A1: the declarative least-privilege app user. SINGLE-FILE mount (not the users.d
      # dir - the image entrypoint WRITES default-user.xml into users.d from the env vars
      # above, so a read-only dir mount would break startup). The mounted file is RENDERED
      # (gitignored) by infra/clickhouse/render-users.sh - `make services-up` renders it
      # automatically; render before any direct `docker compose up`, or the missing bind
      # source becomes an empty directory inside users.d.
      - ./clickhouse/users.d/bullpen.xml:/etc/clickhouse-server/users.d/bullpen.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          # 8 GiB on dev so the 11-season Phase 2a feature build's windowed CTEs don't OOM on
          # fold 3-4 (10-11 year encode windows). Prod WSL2 (12 GiB pool shared with the JVM app)
          # should drop this via BULLPEN_CLICKHOUSE_MEM=4g in /etc/default/bullpen (M3).
          memory: "${BULLPEN_CLICKHOUSE_MEM:-8g}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: bullpen-prometheus
    logging: *bullpen-logging
    restart: unless-stopped
    ports:
      - "9090:9090"
    # On native dockerd (the WSL2 box), host.docker.internal does not resolve by default
    # (Docker Desktop magic only) - map it to the docker gateway so the api/worker JVM
    # scrape targets in prometheus.yml reach the host. No-op on Docker Desktop (Mac dev).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      # M5: scrape credentials (raw user + raw password) for the ADMIN-gated /actuator/prometheus
      # (gitignored real files, .example committed). Seed via infra/prometheus/mk-metrics-secrets.sh.
      - ./prometheus/secrets:/etc/prometheus/secrets:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_PROMETHEUS_MEM:-768m}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: bullpen-grafana
    logging: *bullpen-logging
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      # Fail-closed like ClickHouse above: no admin/admin default on the dashboard that owns
      # every ops panel. The value lives in infra/.env on the box (see infra/.env.example).
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD (no default; admin/admin was the old fallback)}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_GRAFANA_MEM:-512m}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  # --- WS4: watchdog stack (host metrics + alert routing) ---
  # Behind the `monitoring` profile so the default `docker compose up` stays lean (Prometheus
  # tolerates a missing Alertmanager) and dev does not need the Discord secret. On the prod box:
  #   docker compose -f infra/docker-compose.yml --profile monitoring up -d
  # (after creating infra/alertmanager/secrets/discord_url from the .example).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: bullpen-node-exporter
    logging: *bullpen-logging
    profiles: ["monitoring"]
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      # Snapshot-freshness metric written by clickhouse-snapshot.sh on the host (textfile collector).
      - "--collector.textfile.directory=/var/lib/node_exporter"
    volumes:
      - "/:/host:ro,rslave"
      - "/var/lib/node_exporter:/var/lib/node_exporter:ro"
    ports:
      - "9100:9100"
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_NODE_EXPORTER_MEM:-128m}"
    healthcheck:
      # node-exporter v1.8.2 ships on busybox, so wget is available.
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  alertmanager:
    # v0.28.1: discord_configs.webhook_url_file needs v0.28+ - v0.27.0 crash-loops at server
    # load with "no discord webhook URL provided" (amtool check-config passes; its validation
    # is laxer than the server's). Box-found 2026-06-11.
    image: prom/alertmanager:v0.28.1
    container_name: bullpen-alertmanager
    logging: *bullpen-logging
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/secrets:/etc/alertmanager/secrets:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_ALERTMANAGER_MEM:-256m}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  # --- A6 (ADR-0008): self-hosted error tracking via GlitchTip (Sentry-compatible) ---
  # Behind the `errortracking` profile so the default `docker compose up` stays lean
  # (ClickHouse/Prometheus/Grafana). Start with:
  #   GLITCHTIP_SECRET_KEY=$(openssl rand -hex 32) docker compose \
  #     -f infra/docker-compose.yml --profile errortracking up -d
  # See docs/runbooks/error-tracking.md for first-user setup + the DSN wiring.
  glitchtip-postgres:
    image: postgres:17-alpine
    container_name: bullpen-glitchtip-postgres
    logging: *bullpen-logging
    profiles: ["errortracking"]
    restart: unless-stopped
    environment:
      # Parameterized because the repo is public; the defaults preserve the already-initialized
      # volume's credentials (POSTGRES_PASSWORD only applies on FIRST init of glitchtip-pg-data,
      # so changing the env on an existing DB does nothing - rotate inside postgres first).
      POSTGRES_USER: "${GLITCHTIP_DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${GLITCHTIP_DB_PASSWORD:-postgres}"
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_GLITCHTIP_PG_MEM:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GLITCHTIP_DB_USER:-postgres}"]
      interval: 10s
      timeout: 3s
      retries: 5

  glitchtip-redis:
    image: redis:7-alpine
    container_name: bullpen-glitchtip-redis
    logging: *bullpen-logging
    profiles: ["errortracking"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_GLITCHTIP_REDIS_MEM:-256m}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  glitchtip-web:
    image: glitchtip/glitchtip:v4.1.1
    container_name: bullpen-glitchtip-web
    logging: *bullpen-logging
    profiles: ["errortracking"]
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment: &glitchtip-env
      DATABASE_URL: "postgres://${GLITCHTIP_DB_USER:-postgres}:${GLITCHTIP_DB_PASSWORD:-postgres}@glitchtip-postgres:5432/glitchtip"
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY:?set GLITCHTIP_SECRET_KEY to a random hex string, e.g. openssl rand -hex 32}"
      PORT: "8000"
      GLITCHTIP_DOMAIN: "${GLITCHTIP_DOMAIN:-http://localhost:8000}"
      DEFAULT_FROM_EMAIL: "${GLITCHTIP_FROM_EMAIL:-bullpen@localhost}"
      EMAIL_URL: "${GLITCHTIP_EMAIL_URL:-consolemail://}"
      # Single-operator instance: open registration off after the first superuser exists.
      ENABLE_OPEN_USER_REGISTRATION: "${GLITCHTIP_OPEN_REGISTRATION:-false}"
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_GLITCHTIP_WEB_MEM:-768m}"
    healthcheck:
      # The glitchtip image is python-slim (no wget/curl), so probe the port with python.
      test:
        - CMD-SHELL
        - python -c "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',8000)); s.close()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1.1
    container_name: bullpen-glitchtip-worker
    logging: *bullpen-logging
    profiles: ["errortracking"]
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment: *glitchtip-env
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_GLITCHTIP_WORKER_MEM:-768m}"
    # No container healthcheck: a Celery worker has no HTTP port. Liveness comes from
    # `restart: unless-stopped` + the boot-check (infra/check-stack.sh) verifying it is running.

  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.1.1
    container_name: bullpen-glitchtip-migrate
    logging: *bullpen-logging
    profiles: ["errortracking"]
    command: ./manage.py migrate
    environment: *glitchtip-env
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: "${BULLPEN_GLITCHTIP_MIGRATE_MEM:-256m}"
    # No healthcheck: one-shot migration job (runs ./manage.py migrate then exits).

volumes:
  clickhouse-data:
  clickhouse-logs:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  glitchtip-pg-data:

name: thebullpen

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: bullpen-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    environment:
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      # Fail-closed: the container refuses to start without the rotated secret (no known default).
      # Value comes from the single BULLPEN_CLICKHOUSE_PASSWORD the app + scripts also read.
      CLICKHOUSE_PASSWORD: "${BULLPEN_CLICKHOUSE_PASSWORD:?set BULLPEN_CLICKHOUSE_PASSWORD to the rotated ClickHouse secret (no default)}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          # 8 GiB on dev so the 11-season Phase 2a feature build's
          # windowed CTEs don't OOM on fold 3-4 (10-11 year encode
          # windows). Prod WSL2 may want to keep this at 4g.
          memory: 8g
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: bullpen-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    # On native dockerd (the WSL2 box), host.docker.internal does not resolve by default
    # (Docker Desktop magic only) - map it to the docker gateway so the api/worker JVM
    # scrape targets in prometheus.yml reach the host. No-op on Docker Desktop (Mac dev).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: bullpen-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # --- WS4: watchdog stack (host metrics + alert routing) ---
  # Behind the `monitoring` profile so the default `docker compose up` stays lean (Prometheus
  # tolerates a missing Alertmanager) and dev does not need the Discord secret. On the prod box:
  #   docker compose -f infra/docker-compose.yml --profile monitoring up -d
  # (after creating infra/alertmanager/secrets/discord_url from the .example).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: bullpen-node-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      # Snapshot-freshness metric written by clickhouse-snapshot.sh on the host (textfile collector).
      - "--collector.textfile.directory=/var/lib/node_exporter"
    volumes:
      - "/:/host:ro,rslave"
      - "/var/lib/node_exporter:/var/lib/node_exporter:ro"
    ports:
      - "9100:9100"

  alertmanager:
    # v0.28.1: discord_configs.webhook_url_file needs v0.28+ - v0.27.0 crash-loops at server
    # load with "no discord webhook URL provided" (amtool check-config passes; its validation
    # is laxer than the server's). Box-found 2026-06-11.
    image: prom/alertmanager:v0.28.1
    container_name: bullpen-alertmanager
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/secrets:/etc/alertmanager/secrets:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  # --- A6 (ADR-0008): self-hosted error tracking via GlitchTip (Sentry-compatible) ---
  # Behind the `errortracking` profile so the default `docker compose up` stays lean
  # (ClickHouse/Prometheus/Grafana). Start with:
  #   GLITCHTIP_SECRET_KEY=$(openssl rand -hex 32) docker compose \
  #     -f infra/docker-compose.yml --profile errortracking up -d
  # See docs/runbooks/error-tracking.md for first-user setup + the DSN wiring.
  glitchtip-postgres:
    image: postgres:17-alpine
    container_name: bullpen-glitchtip-postgres
    profiles: ["errortracking"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

  glitchtip-redis:
    image: redis:7-alpine
    container_name: bullpen-glitchtip-redis
    profiles: ["errortracking"]
    restart: unless-stopped

  glitchtip-web:
    image: glitchtip/glitchtip:v4.1.1
    container_name: bullpen-glitchtip-web
    profiles: ["errortracking"]
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment: &glitchtip-env
      DATABASE_URL: postgres://postgres:postgres@glitchtip-postgres:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379/0
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY:?set GLITCHTIP_SECRET_KEY to a random hex string, e.g. openssl rand -hex 32}"
      PORT: "8000"
      GLITCHTIP_DOMAIN: "${GLITCHTIP_DOMAIN:-http://localhost:8000}"
      DEFAULT_FROM_EMAIL: "${GLITCHTIP_FROM_EMAIL:-bullpen@localhost}"
      EMAIL_URL: "${GLITCHTIP_EMAIL_URL:-consolemail://}"
      # Single-operator instance: open registration off after the first superuser exists.
      ENABLE_OPEN_USER_REGISTRATION: "${GLITCHTIP_OPEN_REGISTRATION:-false}"
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1.1
    container_name: bullpen-glitchtip-worker
    profiles: ["errortracking"]
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment: *glitchtip-env
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started

  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.1.1
    container_name: bullpen-glitchtip-migrate
    profiles: ["errortracking"]
    command: ./manage.py migrate
    environment: *glitchtip-env
    depends_on:
      glitchtip-postgres:
        condition: service_healthy

volumes:
  clickhouse-data:
  clickhouse-logs:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  glitchtip-pg-data:

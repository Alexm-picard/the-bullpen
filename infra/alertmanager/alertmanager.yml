# WS4: route every Bullpen alert to the EXISTING Discord webhook via Discord's Slack-compatible
# endpoint (append /slack to the webhook URL). The webhook is a secret, so Alertmanager reads it from
# a mounted file (slack_api_url_file) - never committed. Put the full URL INCLUDING the /slack suffix
# in infra/alertmanager/secrets/discord_slack_url (gitignored); see discord_slack_url.example.
# Validate on the box before trusting: `amtool check-config infra/alertmanager/alertmanager.yml`.
global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/secrets/discord_slack_url

route:
  receiver: discord
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts (worker/api down, stale snapshot) re-page hourly until resolved.
    - matchers:
        - severity="critical"
      repeat_interval: 1h

receivers:
  - name: discord
    slack_configs:
      # Discord's Slack endpoint ignores `channel`, but the slack_config schema requires it.
      - channel: "#bullpen-alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

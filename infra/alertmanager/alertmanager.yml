# WS4: route every Bullpen alert to the Discord webhook via Alertmanager's NATIVE Discord
# receiver (discord_configs; webhook_url_file needs v0.28+ - the compose pins v0.28.1. v0.27
# accepts this config in amtool but rejects it at server load: "no discord webhook URL provided").
#
# History: the first cut used Discord's Slack-compatible endpoint (webhook URL + /slack suffix
# through slack_configs). DEAD END - Discord 400s Alertmanager's Slack payload with
# {"attachments":["0"]}, so no /slack-suffix arrangement can ever deliver (box-proven 2026-06-11).
#
# The webhook is a secret, so Alertmanager reads it from a mounted file - never committed. Put the
# RAW webhook URL (https://discord.com/api/webhooks/<id>/<token>, NO suffix) in
# infra/alertmanager/secrets/discord_url (gitignored); see discord_url.example.
# Validate on the box before trusting: `amtool check-config infra/alertmanager/alertmanager.yml`.
global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts (worker/api down, stale snapshot) re-page hourly until resolved.
    - matchers:
        - severity="critical"
      repeat_interval: 1h

receivers:
  - name: discord
    discord_configs:
      - webhook_url_file: /etc/alertmanager/secrets/discord_url
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        message: >-
          {{ range .Alerts }}**{{ .Annotations.summary }}**
          {{ .Annotations.description }}
          {{ end }}

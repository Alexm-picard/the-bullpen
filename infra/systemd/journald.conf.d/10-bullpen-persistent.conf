# The Bullpen journald policy. Installed to /etc/systemd/journald.conf.d/ by
# infra/systemd/install.sh (ADR-0006: box-only state, reconstructable from the repo).
#
# Why this exists: the box's journal was PERSISTENT but UNCAPPED. A crash-looping
# container (GlitchTip's celery worker, OOM-killed every ~10s) drove it to ~3.2 GB
# and forced a corrupted rotation (system@...journal~) every ~6 minutes, which is
# how ~4 days of a single boot's logs were lost before a real triage could read
# them. Storage is pinned explicitly (not left to the base image's Storage=auto,
# which only persists if /var/log/journal already exists) and the size is bounded.
[Journal]
Storage=persistent
SystemMaxUse=500M
SystemKeepFree=1G
SystemMaxFileSize=64M
SystemMaxFiles=12
# ERR-and-above (including the kernel OOM-killer lines) is synced immediately;
# 30s bounds how much of the run-up a hard VM stop can lose from lower levels.
SyncIntervalSec=30s

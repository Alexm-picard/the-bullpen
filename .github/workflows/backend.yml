name: backend

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend.yml']
  pull_request:
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24-alpine
        ports: ['8123:8123', '9000:9000']
        options: --health-cmd "wget -q --spider http://localhost:8123/ping" --health-interval 5s --health-timeout 3s --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build + unit tests
        working-directory: backend
        run: ./gradlew build test --no-daemon
      - name: Spotless check (format must be clean)
        working-directory: backend
        run: ./gradlew spotlessCheck --no-daemon
      - name: Static analysis (SpotBugs)
        working-directory: backend
        run: ./gradlew spotbugsMain --no-daemon
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/

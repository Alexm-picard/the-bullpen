name: backend

on:
  push:
    branches: [main]
    paths: ['backend/**', 'contracts/**', 'training/**', '.github/workflows/backend.yml']
  pull_request:
    paths: ['backend/**', 'contracts/**', 'training/**']

# ClickHouse is intentionally NOT a service container here:
#   - clickhouse/clickhouse-server:*-alpine fails in Actions service runtime
#     (`get_mempolicy: Operation not permitted`) — known Actions/Alpine clash.
#   - Phase 1+ ClickHouse tests use Testcontainers, which spawn their own
#     ephemeral container from inside the JVM at test time. No service block needed.
jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      # The parity test (ToyParityTest) needs real model.onnx + park_hr_rate.json
      # + parity fixture JSON. Without these the test self-disables on a fresh
      # clone. CI synthesizes them deterministically below; no ClickHouse or
      # pybaseball involvement.
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync training deps
        working-directory: training
        run: uv sync --frozen
      - name: Generate CI parity artifacts
        working-directory: training
        run: uv run python -m bullpen_training.battedball.generate_ci_artifacts --write-fixture

      - name: Build + unit tests
        working-directory: backend
        # `test` is finalizedBy jacocoTestReport, so the coverage report is
        # produced here without a separate task invocation.
        # -Dbullpen.it.docker=true enables every @EnabledIfSystemProperty(named="bullpen.it.docker",
        # matches="true") test. Tests in that category:
        #   - LivePitchesRepositoryIT (existing)
        #   - PredictionLogReconciliationIT (W3: truth-join + calibration set)
        # Tests that run WITHOUT a Docker guard (regular unit / Spring IT with tmp SQLite):
        #   - PitchOnnxModelTest (ORT fixture, no Spring)
        #   - LoadedPitchModelTest (snapshot-resolved pre bundle, no Spring)
        #   - PredictPitchRoutingIT (registry + router + log FK, tmp SQLite, no ClickHouse)
        #   - PitchSnapshotLookupRegistrationIT (lookup copy + fail-loud, tmp SQLite)
        # All four new tests are included in the full `test` task scope. No separate
        # filter or include-list is required because they carry no @Disabled or skip guard.
        run: ./gradlew build test --no-daemon -Dbullpen.it.docker=true
      - name: Spotless check (format must be clean)
        working-directory: backend
        run: ./gradlew spotlessCheck --no-daemon
      - name: Static analysis (SpotBugs)
        working-directory: backend
        run: ./gradlew spotbugsMain --no-daemon
      # A2: publish a human-readable coverage summary in the run log. This STEP is report-only;
      # the actual floor (LINE >= 72% / BRANCH >= 58%) is enforced by gradle's
      # jacocoTestCoverageVerification during `build` above (it runs under -Dbullpen.it.docker=true).
      - name: Coverage summary (JaCoCo, report-only)
        if: always()
        working-directory: backend
        env:
          REPORT: build/reports/jacoco/test/jacocoTestReport.xml
        run: |
          if [ -f "$REPORT" ]; then
            python3 -c "import os,xml.etree.ElementTree as ET; r=ET.parse(os.environ['REPORT']).getroot(); g=lambda k:next(((int(c.get('covered')),int(c.get('missed'))) for c in r.findall('counter') if c.get('type')==k),(0,0)); f=lambda k:(lambda cov,mis: f'{100*cov/(cov+mis):.1f}% ({cov}/{cov+mis})' if cov+mis else 'n/a')(*g(k)); print('### Backend coverage (JaCoCo)\n'); [print(f'- **{k.title()}**: {f(k)}') for k in ('LINE','BRANCH','INSTRUCTION')]" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=No JaCoCo report::jacocoTestReport.xml not found"
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/build/reports/jacoco/test/
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/

name: backend

on:
  push:
    branches: [main]
    paths: ['backend/**', 'contracts/**', 'training/**', '.github/workflows/backend.yml']
  pull_request:
    paths: ['backend/**', 'contracts/**', 'training/**']

# ClickHouse is intentionally NOT a service container here:
#   - clickhouse/clickhouse-server:*-alpine fails in Actions service runtime
#     (`get_mempolicy: Operation not permitted`) — known Actions/Alpine clash.
#   - Phase 1+ ClickHouse tests use Testcontainers, which spawn their own
#     ephemeral container from inside the JVM at test time. No service block needed.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      # The parity test (ToyParityTest) needs real model.onnx + park_hr_rate.json
      # + parity fixture JSON. Without these the test self-disables on a fresh
      # clone. CI synthesizes them deterministically below; no ClickHouse or
      # pybaseball involvement.
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync training deps
        working-directory: training
        run: uv sync --frozen
      - name: Generate CI parity artifacts
        working-directory: training
        run: uv run python -m bullpen_training.battedball.generate_ci_artifacts --write-fixture

      - name: Build + unit tests
        working-directory: backend
        run: ./gradlew build test --no-daemon
      - name: Spotless check (format must be clean)
        working-directory: backend
        run: ./gradlew spotlessCheck --no-daemon
      - name: Static analysis (SpotBugs)
        working-directory: backend
        run: ./gradlew spotbugsMain --no-daemon
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/build/reports/

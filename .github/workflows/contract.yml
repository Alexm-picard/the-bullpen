name: contract

# Schemathesis API contract test (plan S1f + Wave C C-33): boots the Spring `api`
# profile and fuzzes every operation in the springdoc OpenAPI spec (/v3/api-docs),
# now enriched by C-32 (OpenApiConfig) with the shared ApiError error envelope and
# request/response examples. Two conformance checks run:
#   - status_code_conformance: every returned status is documented for that operation.
#     This SUBSUMES the old not_a_server_error check - 500 is deliberately undocumented,
#     so a real server error still fails here; but a documented 503 (a predict endpoint
#     with no LIVE champion in the CH-disabled CI boot) is a legitimate response, which
#     lets us fuzz the pitch + all-parks predict paths instead of excluding them.
#   - response_schema_conformance: every response body matches its declared schema -
#     2xx bodies AND the ApiError envelope on 4xx (ApiErrorController makes even
#     container-level errors, e.g. Tomcat-rejected malformed paths, return ApiError).
# Only /v1/admin stays excluded (ADMIN-authed + write-bearing: fuzzing it needs creds
# and would mutate registry/routing state). The schemathesis version is pinned and the
# generator seed is fixed (--seed, v4's rename of --hypothesis-seed) so CI is reproducible.
# History: earlier caught two real "500 on malformed input" bugs (non-numeric path var;
# firewall-rejected header), now fixed + regression-tested.
on:
  push:
    branches: [main]
    paths:
      ['backend/**', 'contracts/**', 'training/**', '.github/workflows/contract.yml']
  pull_request:
    paths: ['backend/**', 'contracts/**']

jobs:
  schemathesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # The toy ONNX must exist for the api context to BOOT: the ToyBattedBallInference bean still
      # warms up (@PostConstruct loads ../training/artifacts/_toy/v0), even though it no longer
      # SERVES. POST /v1/predict/batted-ball now serves the registry champion or 503s (no toy
      # fallback); with no champion in this fuzz stack it returns the declared 503, same as
      # /all-parks and /predict/pitch - schemathesis accepts it (503 is a declared response).
      - name: Sync training deps
        working-directory: training
        run: uv sync --frozen
      - name: Generate toy model artifacts
        working-directory: training
        run: uv run python -m bullpen_training.battedball.generate_ci_artifacts --write-fixture

      - name: Build bootJar
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Boot the api profile (ClickHouse disabled) + wait for health
        working-directory: backend
        env:
          THEBULLPEN_ADMIN_BASIC_AUTH: ci:ci
        run: |
          JAR="$(ls build/libs/*.jar | grep -v plain | head -1)"
          java -jar "$JAR" \
            --spring.profiles.active=api \
            --bullpen.clickhouse.enabled=false \
            --bullpen.ratelimit.enabled=false \
            --server.port=8080 > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> "$GITHUB_ENV"
          # Wait for READINESS, not overall health: WarmupReadiness publishes REFUSING_TRAFFIC ->
          # runs warmup predict() -> ACCEPTING_TRAFFIC, but /actuator/health is UP at context-ready
          # (the start of that window). Firing the fuzzer during warmup is a candidate for the rare
          # non-deterministic 500 (a request racing the first predict()'s lazy init);
          # /actuator/health/readiness stays 503 until warmup completes.
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health/readiness >/dev/null 2>&1; then
              echo "api ready (post-warmup) after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "API did not become healthy:"; tail -40 /tmp/api.log; exit 1

      - name: Schemathesis — status-code + response-schema conformance (all but /v1/admin)
        run: |
          uvx --from 'schemathesis==4.22.3' schemathesis run http://localhost:8080/v3/api-docs \
            --exclude-path-regex '/v1/admin' \
            --checks status_code_conformance,response_schema_conformance \
            --max-examples 100 \
            --seed 1234

      - name: API log tail on failure
        if: failure()
        run: tail -60 /tmp/api.log || true
      - name: Stop API
        if: always()
        run: kill "${API_PID}" 2>/dev/null || true

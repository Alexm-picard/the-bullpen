name: frontend

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend.yml']
  pull_request:
    paths: ['frontend/**']

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci --include=optional
      - name: Type check
        working-directory: frontend
        run: npx tsc -b
      - name: Lint
        working-directory: frontend
        run: npm run lint
      # S3: design-token + a11y discipline gates (previously local-only scripts). Both are clean at
      # the current baseline, so they are blocking - a hex code in a component or a static a11y
      # defect now reds CI.
      - name: Hex-code discipline
        working-directory: frontend
        run: npm run lint:hex-codes
      - name: Static a11y audit
        working-directory: frontend
        run: npm run audit:a11y-static
      # A3: non-blocking CVE signal (Dependabot is the gating mechanism). high+ only.
      - name: Audit dependencies (npm, non-blocking)
        if: always()
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Unit tests + coverage
        working-directory: frontend
        run: npm run test:coverage
      # A2: honest, non-gating coverage baseline surfaced in the run summary.
      - name: Coverage summary (vitest v8, non-gating)
        if: always()
        working-directory: frontend
        run: |
          SUMMARY=coverage/coverage-summary.json
          if [ -f "$SUMMARY" ]; then
            node -e "const t=require('./coverage/coverage-summary.json').total; const r=k=>\`\${t[k].pct}% (\${t[k].covered}/\${t[k].total})\`; console.log('### Frontend coverage (vitest v8)\n'); for (const k of ['lines','statements','branches','functions']) console.log(\`- **\${k[0].toUpperCase()+k.slice(1)}**: \${r(k)}\`);" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning title=No coverage summary::coverage/coverage-summary.json not found"
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
      - name: Build
        working-directory: frontend
        run: npm run build
      # S3: bundle-budget reads dist/ after the build (initial JS < 300 kB gz, any chunk < 250 kB
      # gz). Clean at the current baseline, so it is blocking - a bundle-size regression reds CI.
      - name: Bundle budget
        working-directory: frontend
        run: npm run bundle-budget

  # Playwright E2E activates in Phase 4 when playwright.config.ts lands.
  # Guard is on the file existence in the workspace (post-checkout), not job-level.
  e2e:
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4
      - name: Check for Playwright config
        id: check
        run: |
          if [ -f frontend/playwright.config.ts ] || [ -f frontend/playwright.config.js ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v7
        if: steps.check.outputs.present == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - if: steps.check.outputs.present == 'true'
        working-directory: frontend
        run: npm ci --include=optional && npx playwright install --with-deps chromium
      # A7: now a REQUIRED gate. The smoke (3 fixture render-checks) is stable - 5/5 locally
      # at retries=0 (2026-06-07) + consistently green in CI, and CI keeps retries:1 for extra
      # resilience. A real render regression (uncaught error / missing heading) now reds the build.
      - name: Playwright E2E
        if: steps.check.outputs.present == 'true'
        working-directory: frontend
        run: npx playwright test
      - if: failure() && steps.check.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

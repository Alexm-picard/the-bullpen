name: training

on:
  push:
    branches: [main]
    paths: ['training/**', 'contracts/**', '.github/workflows/training.yml']
  pull_request:
    paths: ['training/**', 'contracts/**']

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync deps
        working-directory: training
        run: uv sync --frozen
      - name: Ruff format check
        working-directory: training
        run: uv run ruff format --check .
      - name: Ruff lint
        working-directory: training
        run: uv run ruff check .
      - name: Pyright
        working-directory: training
        run: uv run pyright
      # A3: non-blocking CVE signal over the actually-synced env (Dependabot gates).
      - name: Audit dependencies (pip-audit, non-blocking)
        if: always()
        continue-on-error: true
        working-directory: training
        run: uv run --with pip-audit pip-audit

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      # Synthesize toy artifacts + parity fixture from a fixed seed so the
      # parity tests actually run (rather than self-disabling). No ClickHouse
      # or pybaseball involvement; see generate_ci_artifacts.py docstring.
      - name: Generate CI parity artifacts
        working-directory: training
        run: uv run python -m bullpen_training.battedball.generate_ci_artifacts --write-fixture
      # PyTorch (added in 2c.5) and LightGBM both bundle their own OpenMP
      # runtime; on macOS dev they fight when co-loaded in a single pytest
      # session, segfaulting LightGBM's `_lazy_init`. Linux CI seems
      # tolerant today but the failure mode is order-dependent — splitting
      # the two suites into separate pytest processes is the future-proof
      # discipline.
      # --cov-append accumulates coverage across the two split pytest processes
      # into one .coverage file. --cov-fail-under=0 disables pytest-cov's PER-RUN
      # threshold check (otherwise the first split would compare its partial
      # coverage against fail_under and fail before the second run appends) — the
      # combined gate is evaluated once in the report step below.
      - name: Unit tests — torch path (mlp/parks/retrodict/physics/eval)
        working-directory: training
        # uv run python -m pytest (not bare `uv run pytest`) so the uv-managed
        # interpreter is used even when an ambient PYTHONPATH or system pytest is
        # on PATH. This avoids the stale-PYTHONPATH quirk where pytest resolves to
        # a system interpreter that lacks pandas/lightgbm.
        run: |
          uv run python -m pytest -x --ignore=tests/leakage \
            --cov=src/bullpen_training --cov-branch --cov-append --cov-fail-under=0 \
            tests/battedball/mlp tests/battedball/parks \
            tests/battedball/retrodict tests/battedball/physics \
            tests/battedball/eval \
            tests/ingest tests/features \
            tests/eval/test_metrics.py tests/eval/test_cv_harness.py
      - name: Unit tests - lightgbm path (pitch, toy training, lgbm/lr baselines, registry, retraining)
        working-directory: training
        # Covers:
        #   tests/pitch/             - W1/W4b pitch ORT fixture, register_snapshot (new)
        #   tests/battedball/lgbm_per_park/ and lr_baseline/ - both now have __init__.py
        #     to resolve the test_export_onnx.py basename collision that breaks default
        #     (prepend) pytest collection. W5 eval/CV additions land in tests/eval/ and
        #     tests/battedball/ which are already globbed by this job.
        #   tests/registry_client/   - feature-hash discipline
        #   tests/retraining/        - trigger/dispatch/run unit tests
        run: |
          uv run python -m pytest -x --ignore=tests/leakage \
            --cov=src/bullpen_training --cov-branch --cov-append --cov-fail-under=0 \
            tests/pitch tests/eval/test_artifact.py \
            tests/battedball/test_train_toy.py \
            tests/battedball/test_python_java_parity.py \
            tests/battedball/lgbm_baseline \
            tests/battedball/lgbm_per_park \
            tests/battedball/lr_baseline \
            tests/registry_client \
            tests/scripts \
            tests/retraining \
            tests/test_smoke.py
      # Coverage gate. 75% (pyproject fail_under) stays the aspirational TARGET, surfaced as a
      # warning. The ENFORCED gate is a regression FLOOR at 55% (the blended coverage.py TOTAL is
      # ~57% as of 2026-07-04, up from ~46%): coverage may not backslide below it, but isn't blocked
      # from shipping today. Raise the floor as coverage climbs toward 75; that's when the floor and
      # the target converge. The floor is coverage.py's combined line+branch TOTAL (--cov-branch on),
      # not the cobertura line-rate.
      - name: Coverage gate (regression floor 55%; 75% is the aspirational target)
        working-directory: training
        run: |
          uv run coverage report || echo "::warning title=Coverage below 75% target::training coverage is under the 75% aspiration (non-blocking)"
          uv run coverage report --fail-under=55 >/dev/null
      - name: Coverage XML artifact
        if: always()
        working-directory: training
        run: uv run coverage xml -o coverage.xml || true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-coverage
          path: training/coverage.xml

  # Required — Phase 2c.2 physics-validation gate (decision [131]).
  # Re-runs the 100-fixture HR validation against the committed fixture
  # set and fails the build if pass_rate < 0.85 or mae_distance_ft > 30 ft.
  # Original ±5%/±15ft/95% gate is pinned in decisions.md for re-attempt
  # after 2c.4's weather pull lands.
  physics-validation-gate:
    runs-on: ubuntu-latest
    needs: lint-and-type
    name: REQUIRED — physics validation gate (decision [131])
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      - name: Run physics validation
        working-directory: training
        run: |
          uv run python -m bullpen_training.battedball.physics.validate \
            --fixtures data/physics_validation_fixtures.json \
            --report data/physics_validation_report.json \
            --enforce-gate
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physics-validation-report
          path: training/data/physics_validation_report.json

  # Required — CLAUDE.md rule 10. The four leakage categories
  # (future contamination, shuffled target, calendar date trace, ID
  # consistency) are real tests as of Phase 2a.3. Any skip without an
  # `# ADR: decisions.md#NN` marker fails the build before the suite even
  # runs, so silent disabling is not an option.
  leakage-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    name: REQUIRED — temporal leakage tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      - name: No skips without ADR marker
        working-directory: training
        run: |
          set -e
          offenders="$(grep -rnE '^\s*@pytest\.mark\.skip' tests/leakage/ || true)"
          if [ -n "$offenders" ]; then
            unsanctioned="$(echo "$offenders" | grep -v '# ADR:' || true)"
            if [ -n "$unsanctioned" ]; then
              echo "ERROR: leakage tests with @pytest.mark.skip lack '# ADR: decisions.md#NN' marker:"
              echo "$unsanctioned"
              exit 1
            fi
          fi
      - name: Leakage suite
        working-directory: training
        # Covers all files in tests/leakage/, including:
        #   test_pitch_head_pre_post_boundary.py (W2 pre/post head split, CLAUDE.md rules 9+10)
        #   test_no_future_contamination.py, test_shuffled_target.py,
        #   test_calendar_date_trace.py, test_id_consistency.py (original four categories)
        #   test_leakage_detector_properties.py (detector meta-tests)
        # uv run python -m pytest avoids the stale-PYTHONPATH quirk (see unit-tests job).
        run: uv run python -m pytest tests/leakage -v

  # Required - DEF-H2. The four leakage tests above validate `build_fold_inmem`, a
  # pure-pandas MIRROR of the production builder, so a leak living in the real SQL
  # (tier_1_2.build_fold_features -> select_labeled_pitches.sql reading past
  # train_end, or a dropped FINAL double-counting a re-ingested pitch) would never
  # trip them. This gate drives the REAL builder against a real ClickHouse.
  # BULLPEN_REQUIRE_CH=1 turns an unreachable CH into a hard failure, so the gate
  # can never pass by silently skipping (which is how the fast job above tolerates
  # having no CH service).
  leakage-sql-gate:
    runs-on: ubuntu-latest
    needs: lint-and-type
    name: REQUIRED - SQL-path leakage gate (real ClickHouse)
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.12
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: thebullpen
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      - name: Wait for ClickHouse
        working-directory: training
        run: |
          for i in $(seq 1 30); do
            if uv run python -c "from clickhouse_driver import Client; Client(host='localhost', port=9000, password='thebullpen').execute('SELECT 1')" 2>/dev/null; then
              echo "ClickHouse ready"; exit 0
            fi
            echo "waiting for ClickHouse ($i)..."; sleep 2
          done
          echo "ClickHouse did not become ready"; exit 1
      - name: Real-ClickHouse SQL gates (leakage path + batted-ball export query)
        working-directory: training
        env:
          BULLPEN_REQUIRE_CH: "1"
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "9000"
          CLICKHOUSE_PASSWORD: thebullpen
        # uv run python -m pytest avoids the stale-PYTHONPATH quirk (see unit-tests job).
        # Both drive REAL queries against the CH service (BULLPEN_REQUIRE_CH=1 = a skip is a failure):
        # the SQL-path leakage test (DEF-H2/H3) + the batted-ball full-data export query (auditor
        # NOTE 2 on #112) so a schema/join/FINAL bug in the export fails here, not on the box's CV.
        run: >
          uv run python -m pytest
          tests/leakage/test_sql_path_contamination.py
          tests/eval/promotion/test_batted_ball_export_ch.py -v

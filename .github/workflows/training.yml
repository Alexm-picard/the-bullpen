name: training

on:
  push:
    branches: [main]
    paths: ['training/**', 'contracts/**', '.github/workflows/training.yml']
  pull_request:
    paths: ['training/**', 'contracts/**']

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync deps
        working-directory: training
        run: uv sync --frozen
      - name: Ruff format check
        working-directory: training
        run: uv run ruff format --check .
      - name: Ruff lint
        working-directory: training
        run: uv run ruff check .
      - name: Pyright
        working-directory: training
        run: uv run pyright

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      # Synthesize toy artifacts + parity fixture from a fixed seed so the
      # parity tests actually run (rather than self-disabling). No ClickHouse
      # or pybaseball involvement; see generate_ci_artifacts.py docstring.
      - name: Generate CI parity artifacts
        working-directory: training
        run: uv run python -m bullpen_training.battedball.generate_ci_artifacts --write-fixture
      - name: Unit tests (incl. parity)
        working-directory: training
        run: uv run pytest -x --ignore=tests/leakage

  # Required — CLAUDE.md rule 10. The four real tests (future contamination,
  # shuffled target, calendar date trace, ID consistency) land in Phase 2a.
  # Until then the placeholder runs so this job stays green; once the real
  # tests are written the placeholder is removed and each test gets its own
  # step in this job.
  leakage-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    name: REQUIRED — temporal leakage tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      - name: Leakage suite
        working-directory: training
        run: uv run pytest tests/leakage -v

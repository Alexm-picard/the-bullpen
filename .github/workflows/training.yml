name: training

on:
  push:
    branches: [main]
    paths: ['training/**', 'contracts/**', '.github/workflows/training.yml']
  pull_request:
    paths: ['training/**', 'contracts/**']

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync deps
        working-directory: training
        run: uv sync --frozen
      - name: Ruff format check
        working-directory: training
        run: uv run ruff format --check .
      - name: Ruff lint
        working-directory: training
        run: uv run ruff check .
      - name: Pyright
        working-directory: training
        run: uv run pyright

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      # Synthesize toy artifacts + parity fixture from a fixed seed so the
      # parity tests actually run (rather than self-disabling). No ClickHouse
      # or pybaseball involvement; see generate_ci_artifacts.py docstring.
      - name: Generate CI parity artifacts
        working-directory: training
        run: uv run python -m bullpen_training.battedball.generate_ci_artifacts --write-fixture
      # PyTorch (added in 2c.5) and LightGBM both bundle their own OpenMP
      # runtime; on macOS dev they fight when co-loaded in a single pytest
      # session, segfaulting LightGBM's `_lazy_init`. Linux CI seems
      # tolerant today but the failure mode is order-dependent — splitting
      # the two suites into separate pytest processes is the future-proof
      # discipline.
      - name: Unit tests — torch path (mlp/parks/retrodict/physics)
        working-directory: training
        run: |
          uv run pytest -x --ignore=tests/leakage \
            tests/battedball/mlp tests/battedball/parks \
            tests/battedball/retrodict tests/battedball/physics \
            tests/ingest tests/features \
            tests/eval/test_metrics.py tests/eval/test_cv_harness.py
      - name: Unit tests — lightgbm path (pitch parity, toy training)
        working-directory: training
        run: |
          uv run pytest -x --ignore=tests/leakage \
            tests/pitch tests/eval/test_artifact.py \
            tests/battedball/test_train_toy.py \
            tests/battedball/test_python_java_parity.py \
            tests/test_smoke.py

  # Required — Phase 2c.2 physics-validation gate (decision [131]).
  # Re-runs the 100-fixture HR validation against the committed fixture
  # set and fails the build if pass_rate < 0.85 or mae_distance_ft > 30 ft.
  # Original ±5%/±15ft/95% gate is pinned in decisions.md for re-attempt
  # after 2c.4's weather pull lands.
  physics-validation-gate:
    runs-on: ubuntu-latest
    needs: lint-and-type
    name: REQUIRED — physics validation gate (decision [131])
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      - name: Run physics validation
        working-directory: training
        run: |
          uv run python -m bullpen_training.battedball.physics.validate \
            --fixtures data/physics_validation_fixtures.json \
            --report data/physics_validation_report.json \
            --enforce-gate
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: physics-validation-report
          path: training/data/physics_validation_report.json

  # Required — CLAUDE.md rule 10. The four leakage categories
  # (future contamination, shuffled target, calendar date trace, ID
  # consistency) are real tests as of Phase 2a.3. Any skip without an
  # `# ADR: decisions.md#NN` marker fails the build before the suite even
  # runs, so silent disabling is not an option.
  leakage-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    name: REQUIRED — temporal leakage tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - working-directory: training
        run: uv sync --frozen
      - name: No skips without ADR marker
        working-directory: training
        run: |
          set -e
          offenders="$(grep -rnE '^\s*@pytest\.mark\.skip' tests/leakage/ || true)"
          if [ -n "$offenders" ]; then
            unsanctioned="$(echo "$offenders" | grep -v '# ADR:' || true)"
            if [ -n "$unsanctioned" ]; then
              echo "ERROR: leakage tests with @pytest.mark.skip lack '# ADR: decisions.md#NN' marker:"
              echo "$unsanctioned"
              exit 1
            fi
          fi
      - name: Leakage suite
        working-directory: training
        run: uv run pytest tests/leakage -v

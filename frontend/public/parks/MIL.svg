<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="American Family Field field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="6.8" y2="236.8"/>
    <line x1="250" y1="480" x2="494.0" y2="236.0"/>
    <!-- outfield wall -->
    <path d="M 494.0 236.0 C 465.4 197.1 431.8 163.3 393.1 134.5 C 348.1 109.2 300.4 91.0 250.0 80.0 C 199.8 92.0 152.5 111.1 108.0 137.2 C 69.3 165.3 35.5 198.5 6.8 236.8"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

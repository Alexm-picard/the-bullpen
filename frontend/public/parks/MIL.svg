<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="American Family Field field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="6.8" y2="236.8"/>
    <line x1="250" y1="480" x2="494.0" y2="236.0"/>
    <!-- outfield wall -->
    <path d="M 6.8 236.8 L 108.0 137.2 L 250.0 80.0 L 393.1 134.5 L 494.0 236.0"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

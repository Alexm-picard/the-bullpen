<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Great American Ball Park field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="18.1" y2="248.1"/>
    <line x1="250" y1="480" x2="479.8" y2="250.2"/>
    <!-- outfield wall -->
    <path d="M 479.8 250.2 C 456.0 208.4 426.6 171.1 391.6 138.2 C 347.5 110.4 300.3 89.6 250.0 76.0 C 199.0 86.7 150.6 104.6 107.7 137.3 L 105.0 129.8 C 70.1 164.9 41.1 204.3 18.1 248.1"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

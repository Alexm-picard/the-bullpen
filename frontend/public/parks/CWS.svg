<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Guaranteed Rate Field field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="16.7" y2="246.7"/>
    <line x1="250" y1="480" x2="486.9" y2="243.1"/>
    <!-- outfield wall -->
    <path d="M 16.7 246.7 L 105.7 131.7 L 250.0 80.0 L 392.4 136.3 L 486.9 243.1"/>
    <!-- home plate (small chevron) -->

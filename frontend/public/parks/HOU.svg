<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Minute Maid Park field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="27.3" y2="257.3"/>
    <line x1="250" y1="480" x2="480.5" y2="249.5"/>
    <!-- outfield wall -->
    <path d="M 27.3 257.3 L 111.5 145.6 L 250.0 71.0 L 392.7 135.4 L 480.5 249.5"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Yankee Stadium field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="25.1" y2="255.1"/>
    <line x1="250" y1="480" x2="472.0" y2="258.0"/>
    <!-- outfield wall -->
    <path d="M 472.0 258.0 C 453.8 209.7 428.9 165.1 397.3 124.3 C 350.8 99.5 301.7 82.1 250.0 72.0 C 197.1 77.5 146.2 90.6 97.3 111.4 C 66.1 155.7 42.0 203.6 25.1 255.1"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

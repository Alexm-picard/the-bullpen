<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Tropicana Field field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="27.3" y2="257.3"/>
    <line x1="250" y1="480" x2="477.7" y2="252.3"/>
    <!-- outfield wall -->
    <path d="M 477.7 252.3 C 454.7 210.0 426.0 171.9 391.6 138.2 C 347.5 110.4 300.3 89.6 250.0 76.0 C 199.7 89.6 152.5 110.4 108.4 138.2 C 75.4 173.8 48.4 213.5 27.3 257.3"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

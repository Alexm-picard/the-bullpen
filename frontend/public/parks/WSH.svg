<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Nationals Park field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="12.4" y2="242.4"/>
    <line x1="250" y1="480" x2="486.9" y2="243.1"/>
    <!-- outfield wall -->
    <path d="M 486.9 243.1 C 460.4 203.4 428.6 168.4 391.6 138.2 C 347.4 111.0 300.2 91.0 250.0 78.0 C 199.2 88.7 151.1 106.6 105.7 131.7 C 69.1 163.9 38.0 200.8 12.4 242.4"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

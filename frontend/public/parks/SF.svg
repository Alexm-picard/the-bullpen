<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Oracle Park field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="10.3" y2="240.3"/>
    <line x1="250" y1="480" x2="468.5" y2="261.5"/>
    <!-- outfield wall -->
    <path d="M 468.5 261.5 C 477.0 215.6 478.5 169.4 473.1 123.0 C 454.0 109.2 433.4 98.6 411.1 91.0 C 357.5 82.3 303.8 81.6 250.0 89.0 C 200.8 100.3 154.4 118.5 110.7 143.7 C 72.4 170.9 38.9 203.1 10.3 240.3"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

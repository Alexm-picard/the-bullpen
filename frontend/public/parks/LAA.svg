<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Angel Stadium field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="14.5" y2="244.5"/>
    <line x1="250" y1="480" x2="485.5" y2="244.5"/>
    <!-- outfield wall -->
    <path d="M 14.5 244.5 L 110.3 142.8 L 250.0 84.0 L 389.7 142.8 L 485.5 244.5"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

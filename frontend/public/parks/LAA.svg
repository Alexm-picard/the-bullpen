<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Angel Stadium field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="14.5" y2="244.5"/>
    <line x1="250" y1="480" x2="485.5" y2="244.5"/>
    <!-- outfield wall -->
    <path d="M 485.5 244.5 C 458.6 205.8 426.7 171.9 389.7 142.8 C 346.1 116.2 299.5 96.6 250.0 84.0 C 200.5 96.6 153.9 116.2 110.3 142.8 C 73.3 171.9 41.4 205.8 14.5 244.5"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

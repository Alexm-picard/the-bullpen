<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Fenway Park field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="30.8" y2="260.8"/>
    <line x1="250" y1="480" x2="463.5" y2="266.5"/>
    <!-- outfield wall -->
    <path d="M 463.5 266.5 C 447.7 217.2 425.0 171.4 395.4 128.9 C 348.9 108.7 300.4 95.7 250.0 90.0 C 226.9 78.5 202.6 70.6 177.1 66.4 C 149.9 83.9 125.8 105.1 105.0 129.8 C 73.7 169.8 49.0 213.4 30.8 260.8"/>
    <!-- wall ticks (per-park overrides) -->
    <line x1="107.3" y1="135.4" x2="102.7" y2="124.3"/>
    <line x1="35.0" y1="265.0" x2="26.6" y2="256.6"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

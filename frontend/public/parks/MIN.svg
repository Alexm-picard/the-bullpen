<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Target Field field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="10.3" y2="240.3"/>
    <line x1="250" y1="480" x2="481.9" y2="248.1"/>
    <!-- outfield wall -->
    <path d="M 10.3 240.3 L 105.7 131.7 L 250.0 69.0 L 390.4 140.9 L 481.9 248.1"/>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Target Field field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="10.3" y2="240.3"/>
    <line x1="250" y1="480" x2="481.9" y2="248.1"/>
    <!-- outfield wall -->
    <path d="M 481.9 248.1 C 456.8 207.8 426.3 172.1 390.4 140.9 C 347.2 109.9 300.4 86.0 250.0 69.0 C 198.8 82.7 150.7 103.6 105.7 131.7 C 68.5 163.1 36.7 199.3 10.3 240.3"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

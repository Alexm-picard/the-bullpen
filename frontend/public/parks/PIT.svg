<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="PNC Park field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="20.2" y2="250.2"/>
    <line x1="250" y1="480" x2="476.3" y2="253.7"/>
    <!-- outfield wall -->
    <path d="M 476.3 253.7 C 454.7 209.5 427.1 169.5 393.5 133.5 C 348.3 108.9 300.5 91.3 250.0 81.0 C 198.4 86.8 148.8 100.0 101.1 120.6 C 67.7 159.8 40.7 202.9 20.2 250.2"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="loanDepot park field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="6.8" y2="236.8"/>
    <line x1="250" y1="480" x2="486.9" y2="243.1"/>
    <!-- outfield wall -->
    <path d="M 6.8 236.8 L 102.3 123.4 L 250.0 73.0 L 400.0 117.8 L 486.9 243.1"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

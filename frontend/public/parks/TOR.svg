<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Rogers Centre field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="18.1" y2="248.1"/>
    <line x1="250" y1="480" x2="481.9" y2="248.1"/>
    <!-- outfield wall -->
    <path d="M 18.1 248.1 L 106.5 133.5 L 250.0 80.0 L 393.5 133.5 L 481.9 248.1"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

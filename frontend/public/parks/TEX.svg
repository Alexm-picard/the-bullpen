<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Globe Life Field field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="17.4" y2="247.4"/>
    <line x1="250" y1="480" x2="480.5" y2="249.5"/>
    <!-- outfield wall -->
    <path d="M 17.4 247.4 L 107.6 136.3 L 250.0 73.0 L 393.1 134.5 L 480.5 249.5"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

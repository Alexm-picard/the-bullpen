<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Globe Life Field field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="17.4" y2="247.4"/>
    <line x1="250" y1="480" x2="480.5" y2="249.5"/>
    <!-- outfield wall -->
    <path d="M 480.5 249.5 C 457.1 206.8 428.0 168.4 393.1 134.5 C 348.5 106.8 300.8 86.3 250.0 73.0 C 199.4 87.0 151.9 108.1 107.6 136.3 C 72.0 168.8 41.9 205.8 17.4 247.4"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

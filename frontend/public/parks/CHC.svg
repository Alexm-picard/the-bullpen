<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Wrigley Field field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="-1.0" y2="229.0"/>
    <line x1="250" y1="480" x2="499.6" y2="230.4"/>
    <!-- outfield wall -->
    <path d="M 499.6 230.4 C 467.9 194.8 431.6 164.7 385.7 146.2 L 390.8 140.0 C 346.9 113.0 299.9 93.0 250.0 80.0 C 200.1 93.0 153.1 113.0 112.3 147.4 L 109.2 140.0 C 68.0 164.2 31.3 193.8 -1.0 229.0"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

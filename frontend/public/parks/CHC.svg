<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Wrigley Field field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="-1.0" y2="229.0"/>
    <line x1="250" y1="480" x2="499.6" y2="230.4"/>
    <!-- outfield wall -->
    <path d="M -1.0 229.0 L 109.2 140.0 L 250.0 80.0 L 390.8 140.0 L 499.6 230.4"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

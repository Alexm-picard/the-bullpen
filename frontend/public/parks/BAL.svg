<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Camden Yards field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="14.5" y2="244.5"/>
    <line x1="250" y1="480" x2="474.9" y2="255.1"/>
    <!-- outfield wall -->
    <path d="M 474.9 255.1 C 453.5 211.1 426.1 171.2 392.7 135.4 C 348.4 106.5 300.8 84.7 250.0 70.0 C 199.9 87.6 153.5 112.2 110.7 143.7 C 73.6 172.5 41.5 206.1 14.5 244.5"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

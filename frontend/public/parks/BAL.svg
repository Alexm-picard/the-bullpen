<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Camden Yards field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="14.5" y2="244.5"/>
    <line x1="250" y1="480" x2="474.9" y2="255.1"/>
    <!-- outfield wall -->
    <path d="M 14.5 244.5 L 110.7 143.7 L 250.0 70.0 L 392.7 135.4 L 474.9 255.1"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

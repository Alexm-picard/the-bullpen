<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="T-Mobile Park field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="15.9" y2="245.9"/>
    <line x1="250" y1="480" x2="480.5" y2="249.5"/>
    <!-- outfield wall -->
    <path d="M 15.9 245.9 L 105.3 130.8 L 250.0 79.0 L 395.8 128.0 L 480.5 249.5"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

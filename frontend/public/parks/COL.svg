<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Coors Field field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="4.6" y2="234.6"/>
    <line x1="250" y1="480" x2="497.5" y2="232.5"/>
    <!-- outfield wall -->
    <path d="M 4.6 234.6 L 100.8 119.7 L 250.0 65.0 L 393.5 133.5 L 497.5 232.5"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

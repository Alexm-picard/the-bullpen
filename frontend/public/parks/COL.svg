<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Coors Field field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="4.6" y2="234.6"/>
    <line x1="250" y1="480" x2="497.5" y2="232.5"/>
    <!-- outfield wall -->
    <path d="M 497.5 232.5 C 467.8 194.3 433.1 161.3 393.5 133.5 C 349.1 103.5 301.3 80.7 250.0 65.0 C 197.5 75.8 147.8 94.0 100.8 119.7 C 63.0 153.2 30.9 191.5 4.6 234.6"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

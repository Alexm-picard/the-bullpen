<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Citi Field field outline"
     fill="none" stroke="currentColor" stroke-width="1"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- dirt infield arc (drawn first; fence overdraws if needed) -->
    <path d="M 313.6 416.4 A 90 90 0 0 0 186.4 416.4" stroke-dasharray="2 2" opacity="0.55"/>
    <!-- foul lines forced to exactly +/- 45 deg -->
    <line x1="250" y1="480" x2="13.1" y2="243.1"/>
    <line x1="250" y1="480" x2="483.3" y2="246.7"/>
    <!-- outfield wall -->
    <path d="M 483.3 246.7 C 460.4 202.1 431.5 162.0 396.6 126.2 C 350.4 100.8 301.6 82.7 250.0 72.0 C 198.8 84.0 150.4 103.3 105.0 129.8 C 68.7 163.0 38.1 200.8 13.1 243.1"/>
    <!-- home plate (small chevron) -->
    <path d="M 244 480 L 250 488 L 256 480 L 256 476 L 244 476 Z"/>
  </symbol>
  <use href="#field"/>
</svg>

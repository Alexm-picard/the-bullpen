<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500"
     role="img" aria-label="Citi Field field outline"
     fill="none" stroke="currentColor" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round">
  <symbol id="field" viewBox="0 0 500 500">
    <!-- foul lines -->
    <line x1="250" y1="480" x2="13.1" y2="243.1"/>
    <line x1="250" y1="480" x2="483.3" y2="246.7"/>
    <!-- outfield wall -->
    <path d="M 13.1 243.1 L 105.0 129.8 L 250.0 72.0 L 396.6 126.2 L 483.3 246.7"/>
